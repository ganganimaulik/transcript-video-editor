<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transcript Video Editor</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="/styles/variables.css">
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/layout.css">
  <link rel="stylesheet" href="/styles/components.css">
  <link rel="stylesheet" href="/styles/animations.css">
</head>
<body>
  
  <div id="app">
    <!-- Toolbar -->
    <header class="toolbar">
      <div class="logo">VideoText Edit</div>
      <div class="toolbar-actions">
        <button id="btn-undo" class="btn-icon" title="Undo (Ctrl+Z)" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14L4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>
        </button>
        <button id="btn-redo" class="btn-icon" title="Redo (Ctrl+Shift+Z)" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 14l5-5-5-5"/><path d="M20 9H9.5A5.5 5.5 0 0 0 4 14.5v0A5.5 5.5 0 0 0 9.5 20H13"/></svg>
        </button>
        <div class="divider"></div>
        <button id="btn-export" class="btn-primary" disabled>Export Video</button>
      </div>
    </header>

    <!-- Main Workspace -->
    <main class="workspace">
      
      <!-- Video Panel -->
      <section class="panel video-panel">
        <div class="panel-header">
          <h2>Preview</h2>
        </div>
        <div class="panel-content">
          
          <!-- Upload State -->
          <div id="upload-view" class="upload-container">
            <div class="upload-split">
              <div class="dropzone" id="dropzone">
                <div class="upload-icon">
                  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </div>
                <p>Drag and drop a video file here</p>
                <span class="upload-or">or</span>
                <button class="btn-secondary" id="btn-browse">Browse Files</button>
                <input type="file" id="file-input" accept="video/mp4,video/webm,video/quicktime" hidden>
              </div>
              <div class="recent-projects" id="recent-projects-container">
                <h3>Recent Projects</h3>
                <div id="projects-list" class="projects-list">
                  <!-- Project cards injected here -->
                  <div class="empty-projects">Loading projects...</div>
                </div>
              </div>
            </div>
          </div>

          <!-- Player State -->
          <div id="player-view" class="player-container hidden">
            <div class="video-wrapper">
              <video id="video-preview"></video>
            </div>
            <div class="player-controls">
              <button id="btn-play" class="btn-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-play"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="icon-pause hidden"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
              </button>
              <div class="time-display">
                <span id="time-current">00:00</span> / <span id="time-duration">00:00</span>
              </div>
            </div>
          </div>
          
        </div>
      </section>

      <!-- Transcript Panel -->
      <section class="panel transcript-panel">
        <div class="panel-header">
          <h2>Transcript</h2>
          <button id="btn-transcribe" class="btn-primary hidden">Generate Transcript</button>
        </div>
        <div class="panel-content">
          <div id="transcript-empty" class="empty-state">
            <p>Upload a video to generate a transcript.</p>
          </div>
          <div id="transcript-loading" class="loading-state hidden">
            <div class="spinner"></div>
            <p id="transcribe-status-text">Uploading video...</p>
          </div>
          <div id="transcript-editor" class="editor-container hidden">
            <!-- Words injected here -->
          </div>
        </div>
      </section>

    </main>

    <!-- Timeline Panel -->
    <footer class="timeline-panel">
      <div class="timeline-container">
        <canvas id="waveform-canvas"></canvas>
        <div id="timeline-segments" class="segments-container"></div>
        <div id="playhead" class="playhead"></div>
      </div>
    </footer>

  </div>

  <!-- Export Modal -->
  <div id="export-modal" class="modal hidden">
    <div class="modal-content">
      <h2>Exporting Video</h2>
      <p>Please wait while your video is being processed.</p>
      <div class="progress-bar-container">
        <div id="export-progress" class="progress-bar" style="width: 0%"></div>
      </div>
      <p id="export-status-text" class="status-text">Starting export...</p>
    </div>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
